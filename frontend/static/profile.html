<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile | RevDynamics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #000101, #0C2E3D);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            position: relative;
            width: 400px;
        }

        .login-box {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            padding: 40px;
            overflow: hidden;
        }

        .login-box::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 15px 50px #000);
            border-radius: 24px;
            animation: rotating 4s linear infinite;
            animation-delay: -1s;
            z-index: 0;
            background: linear-gradient(45deg, var(--performance-blue), var(--metallic-bronze), var(--sand-beige));
        }

        .login-box::after {
            content: '';
            position: absolute;
            inset: 4px;
            background: rgba(12, 46, 61, 0.95);
            border-radius: 20px;
            z-index: 0;
        }

        @keyframes rotating {
            0% {
                transform: rotate(0deg) scale(1.1);
                filter: hue-rotate(0deg);
            }
            100% {
                transform: rotate(360deg) scale(1.1);
                filter: hue-rotate(360deg);
            }
        }

        .login-content {
            position: relative;
            z-index: 1;
            color: var(--light-cream);
            width: 100%;
        }

        .login-content .form-control {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(154, 124, 101, 0.3);
            color: var(--light-cream);
        }

        .login-content .form-control::placeholder {
            color: rgba(196, 166, 182, 0.5);
        }

        .login-content .btn-primary {
            background: linear-gradient(135deg, var(--performance-blue), var(--metallic-bronze));
            border: none;
        }

        .login-content .btn-outline-danger {
            border-color: #DC2626;
            color: #DC2626;
        }

        .login-content .btn-outline-danger:hover {
            background: #DC2626;
            color: white;
        }

        .login-content a {
            color: var(--sand-beige);
        }

        .login-content .text-muted {
            color: rgba(196, 166, 182, 0.6) !important;
        }

        .icon-box i {
            color: var(--metallic-bronze);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-content">
                <div class="text-center mb-4">
                    <div class="icon-box mb-3 p-3 rounded-circle d-inline-block" style="background: rgba(24, 103, 132, 0.2);">
                        <i class="fas fa-user"></i>
                    </div>
                    <h3 class="fw-bold">User Profile</h3>
                    <p class="text-muted">Manage your account settings</p>
                </div>
                
                <form id="profile-form">
                    <div class="mb-3">
                        <label class="form-label small fw-bold" style="color: var(--sand-beige);">Email</label>
                        <input type="email" class="form-control" id="profile-email" disabled>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label small fw-bold" style="color: var(--sand-beige);">Display Name</label>
                        <input type="text" class="form-control" id="profile-name" placeholder="Your name">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label small fw-bold" style="color: var(--sand-beige);">New Password (leave empty to keep current)</label>
                        <input type="password" class="form-control" id="profile-password" placeholder="Enter new password">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label small fw-bold" style="color: var(--sand-beige);">Confirm New Password</label>
                        <input type="password" class="form-control" id="profile-confirm-password" placeholder="Confirm new password">
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-bold mb-3">
                        <i class="fas fa-save me-2"></i>Save Changes
                    </button>
                    
                    <button type="button" class="btn btn-outline-danger w-100 rounded-pill py-2 fw-bold" onclick="logout()">
                        <i class="fas fa-sign-out-alt me-2"></i>Logout
                    </button>
                </form>
                
                <div class="text-center mt-3">
                    <a href="index.html" class="text-muted small text-decoration-none">
                        <i class="fas fa-arrow-left me-2"></i>Back to Dashboard
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/api-client.js"></script>
    <script src="/js/auth-guard.js"></script>
    <script>
        async function loadProfile() {
            try {
                const result = await fetch('/api/profile', { credentials: 'include' });
                if (result.ok) {
                    const user = await result.json();
                    document.getElementById('profile-email').value = user.email;
                    document.getElementById('profile-name').value = user.name || '';
                } else {
                    window.location.href = 'welcome.html';
                }
            } catch (err) {
                window.location.href = 'welcome.html';
            }
        }

        async function logout() {
            await fetch('/api/logout', { method: 'POST', credentials: 'include' });
            window.location.href = 'welcome.html';
        }

        document.addEventListener('DOMContentLoaded', loadProfile);

        document.getElementById('profile-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const name = document.getElementById('profile-name').value;
            const password = document.getElementById('profile-password').value;
            const confirmPassword = document.getElementById('profile-confirm-password').value;
            
            if (password && password !== confirmPassword) {
                alert('Passwords do not match');
                return;
            }
            
            const updateData = { name };
            if (password) updateData.password = password;
            
            const result = await fetch('/api/profile', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify(updateData)
            });
            
            if (result.ok) {
                alert('Profile updated successfully!');
                document.getElementById('profile-password').value = '';
                document.getElementById('profile-confirm-password').value = '';
            } else {
                alert('Failed to update profile');
            }
        });
    </script>
</body>
</html>
