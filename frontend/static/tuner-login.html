<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuner Login | RevDynamics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #000101, #0C2E3D);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            position: relative;
            width: 400px;
            min-height: 500px;
        }

        .login-box {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            padding: 40px;
            overflow: hidden;
        }

        .login-box::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 15px 50px #000);
            border-radius: 24px;
            animation: rotating 4s linear infinite;
            animation-delay: -1s;
            z-index: 0;
            background: linear-gradient(45deg, var(--performance-blue), var(--metallic-bronze), var(--sand-beige));
        }

        .login-box::after {
            content: '';
            position: absolute;
            inset: 4px;
            background: rgba(12, 46, 61, 0.95);
            border-radius: 20px;
            z-index: 0;
        }

        @keyframes rotating {
            0% {
                transform: rotate(0deg) scale(1.1);
                filter: hue-rotate(0deg);
            }
            100% {
                transform: rotate(360deg) scale(1.1);
                filter: hue-rotate(360deg);
            }
        }

        .login-content {
            position: relative;
            z-index: 1;
            color: var(--light-cream);
            width: 100%;
        }

        .login-content .form-control {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(154, 124, 101, 0.3);
            color: var(--light-cream);
        }

        .login-content .form-control::placeholder {
            color: rgba(196, 166, 182, 0.5);
        }

        .login-content .input-group-text {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(154, 124, 101, 0.3);
            color: var(--performance-blue);
        }

        .login-content .btn-primary {
            background: linear-gradient(135deg, var(--performance-blue), var(--metallic-bronze));
            border: none;
        }

        .login-content a {
            color: var(--sand-beige);
        }

        .login-content .text-muted {
            color: rgba(196, 166, 182, 0.6) !important;
        }

        .login-content hr {
            border-color: rgba(154, 124, 101, 0.2);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-content">
                <div class="text-center mb-4">
                    <i class="fas fa-wrench fa-3x mb-3" style="color: var(--metallic-bronze);"></i>
                    <h3 class="fw-bold">Professional Tuner Login</h3>
                    <p class="text-muted">Access advanced dyno tuning software</p>
                </div>
                
                <form>
                    <div class="mb-3">
                        <label class="form-label small fw-bold" style="color: var(--sand-beige);">Tuner Email</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fas fa-envelope"></i>
                            </span>
                            <input type="email" class="form-control" placeholder="tuner@shop.com">
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label small fw-bold" style="color: var(--sand-beige);">Password</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fas fa-lock"></i>
                            </span>
                            <input type="password" class="form-control" placeholder="Tuner password">
                        </div>
                    </div>
                    
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="shop">
                        <label class="form-check-label small text-muted" for="shop">Professional Shop Account</label>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-bold mb-3">
                        <i class="fas fa-tools me-2"></i>Open Tuning Suite
                    </button>
                </form>
                
                <div class="text-center">
                    <a href="forgot-password.html" class="text-muted small text-decoration-none">Forgot tuner credentials?</a>
                </div>
                
                <hr class="my-4">
                
                <div class="text-center">
                    <span class="text-muted small">Not a professional tuner? </span>
                    <a href="owner-login.html" class="text-decoration-none">Switch to Owner Access</a>
                </div>
            </div>
        </div>
    </div>
    
    <script src="/js/api-client.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.querySelector('form');
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                const email = document.querySelector('input[type="email"]').value;
                const password = document.querySelector('input[type="password"]').value;
                
                try {
                    const result = await window.apiClient.login({email, password});
                    if (result.success) {
                        window.location.href = 'dashboard';
                    } else {
                        alert(result.error || 'Login failed');
                    }
                } catch (err) {
                    alert('Login failed. Check backend connection.');
                }
            });
        });
    </script>
</body>
</html>
